name: hotel-robot-openenv
version: "1.0.0"
description: >
  A reinforcement learning environment where a hotel delivery robot navigates
  floors and rooms to complete deliveries. Features guest rating system,
  battery management, and an angry guest that cancels orders if too slow.

environment:
  entry_point: env.hotel_env:HotelEnv
  actions:
    - up
    - down
    - next_room
    - prev_room
    - deliver
    - finish
    - recharge
  observation:
    current_floor:
      type: int
      description: Robot current floor
    current_room:
      type: int
      description: Robot current room number
    target_floor:
      type: int
      description: Target delivery floor
    target_room:
      type: int
      description: Target delivery room
    delivered:
      type: bool
      description: Whether item has been delivered
    guest_rating:
      type: int
      description: Star rating from guest 0-5 (set after delivery)
    guest_mood:
      type: str
      description: Guest mood - happy/neutral/annoyed/angry/furious
    battery:
      type: int
      description: Battery level 0-100
    charging:
      type: bool
      description: Whether robot is at charging station
    steps:
      type: int
      description: Steps taken so far

tasks:
  - name: easy
    description: Same floor, nearby room. Battery sufficient, guest stays happy.
    entry_point: env.tasks:get_task
    args:
      task_name: easy
    grader: env.grader:grade
    max_steps: 20

  - name: medium
    description: Different floor and room. Battery used but survives.
    entry_point: env.tasks:get_task
    args:
      task_name: medium
    grader: env.grader:grade
    max_steps: 30

  - name: hard
    description: Starts at 80% battery. Must recharge or dies. Guest gets annoyed.
    entry_point: env.tasks:get_task
    args:
      task_name: hard
    grader: env.grader:grade
    max_steps: 60

agent:
  entry_point: inference:main
  inference_script: inference.py

reward:
  min: -10.0
  max: 7.9
  description: >
    Step penalty -0.1. Floor bonus +1.0, room bonus +2.0 (scaled by mood).
    Delivery +3.0 + rating bonus up to +2.0. Finish +5.0.
    Battery death -5.0. Order cancelled -10.0. Wrong delivery -2.0.

metadata:
  author: nandha2432
  tags:
    - navigation
    - delivery
    - robotics
    - real-world
    - battery-management
    - multi-constraint
  license: MIT